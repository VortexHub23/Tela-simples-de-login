<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="script.js"></script>
</head>
<body>
    <main>
       <h1>Bem vindo!</h1>
       <section id="section">
          <h2>Login</h2>
          <form action="" onmouseleave="sair()">
            <div class="input-box" id="box-email">
          <i class="fa-regular fa-envelope"></i><input type="email" id="email" placeholder="Email..." autocomplete="off">
          </div>
          <br>
          <div class="input-box" id="box-password">
          <i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Senha..." > <br>
          </div>
          <ul id="lista"></ul>
          <span>
          <input type="checkbox" id="checkbox">Lembrar de mim </span><br>
          <button type="button" onclick="clicar(event)">Login</button><br>
          
          <a href="#">Esqueceu a senha?</a>



          </form>
       </section>


    </main>
    <footer>@Vortex</footer>
</body>
</html>
